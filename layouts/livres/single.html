{{ define "main" }}
<article class="content-narrow content-reading">
  <h1>{{ partial "fr-typo.html" .Title }}</h1>
  {{ with .Params.isbn }}<p class="livre-card__isbn">ISBN&nbsp;: {{ . }}</p>{{ end }}

  {{ .Content }}

  {{ if or .Params.url_amazon_fr .Params.url_amazon_com }}
    {{- partial "amazon-button.html" . -}}
  {{ end }}

  {{- partial "transmettre.html" . -}}
</article>

<!-- Schema.org Book -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Book",
  "name": {{ .Title | jsonify }},
  "author": {
    "@type": "Person",
    "name": "Stéphane Lalut",
    "sameAs": "https://orcid.org/0009-0002-1794-4895"
  },
  {{ with .Params.isbn }}"isbn": {{ . | jsonify }},{{ end }}
  "description": {{ .Description | jsonify }},
  "inLanguage": "fr",
  "publisher": {
    "@type": "Organization",
    "name": "Stéphane Lalut"
  },
  "url": "{{ .Permalink }}"
}
</script>
{{ end }}
