{{ define "main" }}
<div class="content-narrow">
  <h1>{{ partial "fr-typo.html" .Title }}</h1>
  {{ .Content }}

  {{ $frSite := index site.Sites 0 }}
  {{ $pubs := where $frSite.RegularPages "Type" "publications" }}
  {{ range $pubs.ByDate.Reverse }}
    {{ partial "publication-card.html" . }}
  {{ end }}
</div>
{{ end }}
