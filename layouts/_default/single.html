{{ define "main" }}
<article class="home-section">
  <header class="article__header">
    <h1>{{ partial "fr-typo.html" .Title }}</h1>
    {{ with .Description }}<p class="article__lede">{{ . }}</p>{{ end }}
  </header>
  <div class="article__body content-narrow">
    {{ .Content }}
    {{- partial "transmettre.html" . -}}
  </div>
</article>
{{ end }}
