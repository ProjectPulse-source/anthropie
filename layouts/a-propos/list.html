{{ define "main" }}
<div class="home-section">
  <h1>{{ partial "fr-typo.html" .Title }}</h1>
  {{ $parts := split .Content "<!-- AWP_LIST -->" }}
  {{ index $parts 0 | safeHTML }}
  {{- partial "awp-list.html" . -}}
  {{ if gt (len $parts) 1 }}
    {{ index $parts 1 | safeHTML }}
  {{ end }}
</div>
{{ end }}
