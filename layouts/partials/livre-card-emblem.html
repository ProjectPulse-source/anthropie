{{- $title := .title -}}
{{- $url := .url -}}
{{- $image := .image | default "/images/livres/anthropie-cover.jpg" -}}
{{- $alt := .alt | default (printf "Couverture du livre %s" $title) -}}

<a href="{{ $url }}" class="book-emblem" aria-label="{{ $title }}">
  <picture class="book-emblem__frame">
    <source srcset="{{ replace $image ".jpg" ".avif" }}" type="image/avif">
    <source srcset="{{ replace $image ".jpg" ".webp" }}" type="image/webp">
    <img src="{{ $image }}" alt="{{ $alt }}" width="160" height="232" loading="eager">
  </picture>
</a>
