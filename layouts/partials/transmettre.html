<div class="transmettre">
  <button
    type="button"
    class="transmettre__button"
    aria-expanded="false"
    aria-controls="transmettre-panel-{{ .File.UniqueID }}">
    <svg class="transmettre__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="18" cy="5" r="3"/>
      <circle cx="6" cy="12" r="3"/>
      <circle cx="18" cy="19" r="3"/>
      <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
      <line x1="15.41" y1="6.51" x2="8.59" y2="11.49"/>
    </svg>
    <span>Transmettre</span>
  </button>

  <div
    class="transmettre__panel"
    id="transmettre-panel-{{ .File.UniqueID }}"
    role="menu"
    hidden>
    <a
      href="#"
      class="transmettre__option"
      data-channel="bluesky"
      data-title="{{ .Title }}"
      data-url="{{ .Permalink }}"
      role="menuitem">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 10.8c-1.087-2.114-4.046-6.053-6.798-7.995C2.566.944 1.561 1.266.902 1.565.139 1.908 0 3.08 0 3.768c0 .69.378 5.65.624 6.479.815 2.736 3.713 3.66 6.383 3.364-3.912.58-7.387 2.005-2.83 7.078 5.013 5.19 6.87-1.113 7.823-4.308.953 3.195 2.05 9.271 7.733 4.308 4.267-4.308 1.172-6.498-2.74-7.078 2.67.297 5.568-.628 6.383-3.364.246-.829.624-5.79.624-6.479 0-.689-.139-1.86-.902-2.203C22.439 1.266 21.434.944 18.798 2.805 16.046 4.748 13.087 8.687 12 10.8Z"/>
      </svg>
      <span>Bluesky</span>
    </a>
    <a
      href="#"
      class="transmettre__option"
      data-channel="linkedin"
      data-url="{{ .Permalink }}"
      role="menuitem">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.063 2.063 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
      </svg>
      <span>LinkedIn</span>
    </a>
    <a
      href="#"
      class="transmettre__option"
      data-channel="email"
      data-title="{{ .Title }}"
      data-url="{{ .Permalink }}"
      role="menuitem">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
      <span>Email</span>
    </a>
    <button
      type="button"
      class="transmettre__option"
      data-channel="copy"
      data-url="{{ .Permalink }}"
      role="menuitem">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
      <span class="transmettre__copy-label">Copier le lien</span>
    </button>
  </div>
</div>
