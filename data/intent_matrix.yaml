        statut: couverte
        risk: faible
        conversion: faible
      - q: "ordre ici dette ailleurs"
        statut: couverte
        risk: faible
        conversion: fort
        destination: /livres/anthropie-ordre-ici-dette-ailleurs/  # H2 dédié « Que signifie… »
        notes: "désambiguïsation vs Benjamin Lemoine (L'ordre de la dette) faite"
      - q: "déplacement du désordre"
        statut: couverte
        risk: faible
        conversion: moyen
      - q: "dette anthropique"
        statut: enrichissement
        risk: faible
        conversion: moyen
        notes: "terme présent dans le corpus AWP ; pas d'ancre H2/FAQ dédiée — bloc possible page concept, pas de page"
    cercle_2_conceptuel_proche:
      - q: "coûts cachés de l'intelligence artificielle"
        statut: couverte
        destination: /dette-technologique/
        risk: faible
        conversion: moyen
        notes: "page pont 04/07 + AWP-06/07 (registres énergie/matière/attention)"
      - q: "dette technique et dette écologique"
        statut: couverte
        destination: /dette-technologique/
        risk: faible
        conversion: moyen
      - q: "coût environnemental des data centers"
        statut: enrichissement
        destination: /dette-technologique/
        risk: faible
        conversion: faible
        notes: "traité par angle infrastructure ; pas de page dédiée (differee sans signal)"
      - q: "externalités du numérique / cost-shifting (K. W. Kapp)"
        statut: couverte
        destination: /quest-ce-que-lanthropie/   # FAQ Kapp FR+EN
        risk: faible
        conversion: faible
        notes: "pont EN principal = cost-shifting, pas externalities (doctrine 04/07)"
      - q: "entropie et économie / Georgescu-Roegen"
        statut: enrichissement
        destination: /quest-ce-que-lanthropie/   # section anthropie/entropie existante
        risk: faible
        conversion: faible
        notes: "adossement = stratégie de fond (boucle GEO) ; citations tierces > on-site"
      - q: "concept pour penser la modernité / sciences sociales et dette"
        statut: enrichissement
        risk: moyen
        conversion: faible
        notes: "formulations génériques — ne jamais créer de page « concept fécond » (listicle interdit)"
    cercle_5_oeuvres:
      - q: "anthropie livre / ANTHROPIE Lalut"
        statut: couverte
        destination: /livres/anthropie-ordre-ici-dette-ailleurs/
        risk: faible
        conversion: fort
        notes: "confusion concept/livre désambiguïsée : Wikidata Q138827949 (concept) ≠ Q138827344 (livre)"

