# =============================================================================
# MATRICE D'INTENTIONS GEO — plan de bataille éditorial versionné (GEO-04)
# =============================================================================
# DOCTRINE — à lire avant toute modification :
#
# 1. AUCUNE page ne se crée depuis ce fichier. Les requêtes « differee » ne
#    sont PAS un backlog de pages : elles attendent un SIGNAL EXTERNE
#    (doctrine PROJECT_STATUS §7 — pages-ponts en réaction, pas en
#    anticipation). Les cercles 3-4 (culture large, cadeau) se captent par
#    ENRICHISSEMENT des pages existantes, jamais par pages nouvelles.
# 2. Statut par requête : couverte | enrichissement | differee | ecartee.
# 3. Owner : l'auteur. Déclencheurs de mise à jour : ajout d'une œuvre
#    (docs/CHECKLIST_AJOUT_LIVRE.md / _PUBLICATION.md / _CONCEPT.md) et
#    routine GEO trimestrielle (lecture requête par requête de l'état).
# 4. Aucun chiffre canonique en dur ici ni dans les faq[] des pages : la
#    source unique est data/works.yaml (corpus_stats).
# 5. Fichier INERTE côté build : aucun template Hugo ne le consomme à ce
#    stade. Toute consommation future (blocs « à lire aussi », FAQ générées)
#    est une décision séparée, à valider.
#
# risk : faible | moyen | doorway_a_eviter
# conversion : faible | moyen | fort
# autorite : primaire (page du site) | secondaire (page d'appui) | externe
# =============================================================================

version: "1.0 (2026-07-09, audit GEO-04)"

entities:

