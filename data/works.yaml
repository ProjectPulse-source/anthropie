  - id: awp-01
    type: awp
    series: "Anthropie Working Papers"
    series_number: 1
    canonical_title:
      fr: "Qu'est-ce que l'anthropie ? Principes d'une hypothèse"
      en: "What is Anthropy? Principles of a Hypothesis"
    publication_date_fr: "2026-02-01"
    publication_date_en: "2026-04-05"
    license: "CC-BY 4.0"
    abstract_short:
      fr: "L'anthropie est l'hypothèse selon laquelle tout ordre social local se construit en exportant son désordre vers d'autres lieux, d'autres temps ou d'autres groupes sociaux. Ce texte fondateur soutient que le déplacement du désordre constitue un mécanisme structurel observable dans toute configuration d'ordre stable."
      en: "Anthropy is the hypothesis that every stable local social order is built by exporting its disorder to other places, other times, or other social groups. This founding text argues that the displacement of disorder constitutes a structural mechanism observable in every configuration of stable order."
    keywords:
      fr: [anthropie, désordre social, transfert entropique, systèmes sociaux, économie institutionnelle]
      en: [anthropy, social disorder, entropic transfer, social systems, institutional economics]
    jel_codes: [B41, D02, Z13]
    deposits:
      zenodo_fr: { doi: "10.5281/zenodo.19266862", url: "https://doi.org/10.5281/zenodo.19266862", status: published }
      zenodo_en: { doi: "10.5281/zenodo.19431208", url: "https://doi.org/10.5281/zenodo.19431208", status: published }
      ssrn_en: { abstract_id: "6543618", doi: "10.2139/ssrn.6543618", url: "https://papers.ssrn.com/sol3/papers.cfm?abstract_id=6543618", status: approved }
      mpra_en: { item_id: "128604", url: "https://mpra.ub.uni-muenchen.de/id/eprint/128604", status: in_review, deposit_date: "2026-04-07" }
    site_pages:
      fr: "https://stephane-lalut.com/awp/awp-01/"
