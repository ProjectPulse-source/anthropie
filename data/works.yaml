  - id: awp-06
    type: awp
    series: "Anthropie Working Papers"
    series_number: 6
    canonical_title:
      fr: "Infrastructures numériques et dette technologique : data centers, IA et déplacement du désordre"
      en: "Digital Infrastructures and Technological Debt: Data Centers, AI, and the Displacement of Disorder"
    publication_date_fr: "2026-05-07"
    publication_date_en: "2026-05-07"
    license: "CC-BY 4.0"
    abstract_short:
      fr: "L'anthropie désigne le mécanisme par lequel les systèmes sociaux déplacent le désordre plutôt qu'ils ne le résolvent. Cet article examine les infrastructures numériques contemporaines — data centers, IA générative, chaînes matérielles, territoires d'accueil, dispositifs de garantie publique — comme régime structuré de déplacement."
      en: "Existing analyses of digital infrastructures often treat materialist critique, opacity studies, and environmental footprint accounting as separate approaches, thereby missing the broader regime that connects them. This paper applies the framework of anthropy to contemporary digital infrastructures: data centers, generative AI, material supply chains, host territories, and public guarantee mechanisms."
    keywords:
      fr: [anthropie, data centers, IA générative, derisking, infrastructures numériques]
