name: Veille IA visibilité (mensuelle)

on:
  schedule:
    - cron: '0 6 15 * *'  # 15 du mois, 6h UTC
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Créer l'issue mensuelle de veille
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const sources = fs.readFileSync('docs/veille-ia/sources.md', 'utf8');
            const today = new Date().toISOString().slice(0,10);
            const month = new Date().toLocaleString('fr-FR', { month: 'long', year: 'numeric' });
            const body = `Tour de veille mensuel — ${month}\n\nObjectif : capter les évolutions de la visibilité dans les moteurs IA (Overviews, Copilot, Perplexity, agents) et dans les graphes académiques (OpenAlex, Crossref, Scholar) qui pourraient affecter la stratégie GEO du corpus Anthropie.\n\n## Sources à parcourir\n\n${sources}\n\n## Synthèse à rédiger\n\nEn fin de tour, créer un commit dans docs/veille-ia/digests/${today}.md contenant :\n- 3 à 5 évolutions notables du mois\n- Implications pour stephane-lalut.com (si pertinent)\n- Décisions ou tests à envisager\n\nDurée cible : 15-20 minutes. Si rien de notable, fermer l'issue avec mention "RAS — ${today}".`;
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Veille IA visibilité — ${month}`,
              body: body,
              labels: ['veille', 'ia']
            });
