name: Rappels d'audit (J+30, J+60, J+90 — 2026)

on:
  schedule:
    - cron: '0 8 22 6 *'   # J+30 : 22 juin 2026, 8h UTC
    - cron: '0 8 22 7 *'   # J+60 : 22 juillet 2026
    - cron: '0 8 21 8 *'   # J+90 : 21 août 2026
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Calculer le palier
        id: stage
        run: |
          month=$(date -u +%m)
          day=$(date -u +%d)
          year=$(date -u +%Y)
          if [ "$year" = "2026" ] && [ "$month" = "06" ] && [ "$day" = "22" ]; then
            echo "stage=J+30" >> $GITHUB_OUTPUT
          elif [ "$year" = "2026" ] && [ "$month" = "07" ] && [ "$day" = "22" ]; then
            echo "stage=J+60" >> $GITHUB_OUTPUT
          elif [ "$year" = "2026" ] && [ "$month" = "08" ] && [ "$day" = "21" ]; then
            echo "stage=J+90" >> $GITHUB_OUTPUT
          else
            echo "stage=manuel" >> $GITHUB_OUTPUT
          fi
      - name: Créer l'issue de rappel
        uses: actions/github-script@v7
        with:
          script: |
            const stage = '${{ steps.stage.outputs.stage }}';
            const today = new Date().toISOString().slice(0,10);
            const checklist = `
            ## Observations à recueillir (${stage} — ${today})

            Base de comparaison : audit diagnostique du 23 mai 2026, audits/diagnostic-2026-05-23.md.

            ### Indexation et graphe
            - [ ] OpenAlex A5130851063 : présence d'AWP-01 et AWP-06 dans la fiche auteur
            - [ ] Wikidata items AWP (Q139771989 à Q139771994) : enrichissements par des tiers
            - [ ] Google Scholar profil : citations entrantes, nouvelles entrées dans les working papers
            - [ ] OpenLibrary : fusion des deux doublons LIT (statut Super-Librarian)

            ### Métriques de visibilité
            - [ ] Search Console : queries d'entrée, impressions sur "anthropie", confusion éventuelle "Anthropocène", CTR page concept
            - [ ] Bing Webmaster "AI Performance" : impressions générées via AI Overviews / Copilot
            - [ ] GoatCounter : pages d'entrée, profondeur de parcours, part AWP vs home
            - [ ] Téléchargements Zenodo par AWP (snapshot quotidien, agrégation mensuelle)

            ### Citations et mentions
            - [ ] Recherche manuelle "Stéphane Lalut anthropie" / "anthropy displacement disorder"
            - [ ] Vérification backlinks .edu, mentions presse, citations académiques
            - [ ] SSRN profil 11065608 : vérification manuelle (anti-bot pour healthcheck auto)

            ### Décisions à prendre
            ${stage === 'J+30' ? '- [ ] Exécuter le prompt d\'audit comparatif (audits/prompts/diagnostic-compare-template.md) pour produire un delta avec le 23 mai\n- [ ] Décider d\'enchaîner ou non sur la Phase 2 du single-source (drafts dans audits/phase2-drafts/)' : ''}
            ${stage === 'J+60' ? '- [ ] Arbitrer la Vague 4 (uniformisation DOI AWP-05) selon ce qu\'OpenAlex et Scholar listent\n- [ ] Préparer la campagne ciblée sept-oct sur AWP-06 (liste ~18 chercheurs, draft email avec citation AWP-06)' : ''}
            ${stage === 'J+90' ? '- [ ] Sortie de la phase 90 jours — bilan global comparatif J+0 / J+30 / J+60 / J+90\n- [ ] Refonte du prompt projet "SITE INTERNET" sur la base du retour d\'usage\n- [ ] Décision sur Google Scholar (création différée tant que circulation interne non stabilisée — réévaluer)\n- [ ] Réévaluer la pertinence de maintenir les workflows monitoring/veille au-delà' : ''}

            ### Sources externes à observer
            Voir docs/veille-ia/sources.md pour la checklist mensuelle.
            `;
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Audit ${stage} — observations ${today}`,
              body: checklist,
              labels: ['audit', stage.toLowerCase().replace('+', 'plus')]
            });
