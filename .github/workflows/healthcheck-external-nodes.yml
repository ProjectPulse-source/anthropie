name: Healthcheck nœuds externes (mensuel)

on:
  schedule:
    - cron: '0 8 5 * *'  # 5 du mois, 8h UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Vérifier les nœuds externes
        id: check
        run: |
          set +e
          declare -A NODES=(
            ["ORCID"]="https://orcid.org/0009-0002-1794-4895"
            ["Zenodo community"]="https://zenodo.org/communities/anthropie-working-papers"
            ["OpenAlex auteur"]="https://api.openalex.org/authors/A5130851063"
            ["Wikidata concept"]="https://www.wikidata.org/wiki/Q138909233"
            ["Wikidata Anthropie ouvrage"]="https://www.wikidata.org/wiki/Q138827344"
            ["OpenLibrary auteur"]="https://openlibrary.org/authors/OL16378291A"
            ["OSF/SocArXiv"]="https://osf.io/ymkpj/"
            ["IdRef"]="https://www.idref.fr/283054085"
            ["Google Scholar"]="https://scholar.google.com/citations?user=J4NqzwSfrHAC"
            ["Academia"]="https://independent.academia.edu/StéphaneLALUT"
          )
          # Nœuds à anti-bot connu : depuis une IP de datacenter, leur 403 est
          # indiscernable d'un vrai refus, donc inexploitable. Vérification manuelle.
          # Google Scholar y est entré le 2026-07-15 (403 le 05/07 depuis le runner,
          # 200 depuis un poste : faux positif de même famille qu'Academia et SSRN).
          ANTIBOT="|Academia|Google Scholar|"
          PROBLEMS=""
          for name in "${!NODES[@]}"; do
            url="${NODES[$name]}"
            # Trois tentatives : une seule confond un hoquet réseau avec une panne.
            # IdRef a répondu 000 le 05/07 depuis le runner, 200 depuis un poste.
            for attempt in 1 2 3; do
              status=$(curl -s -L -o /dev/null -w "%{http_code}" --max-time 30 "$url")
              [[ "$status" =~ ^(200|301|302|308)$ ]] && break
              [ "$attempt" -lt 3 ] && sleep 5
            done
            echo "$name : $url -> $status"
            if [[ "$ANTIBOT" == *"|$name|"* && "$status" == "403" ]]; then
              echo "  -> 403 attendu (anti-bot), ignoré"
              continue
            fi
            # SSRN exclu volontairement (anti-bot 403 fréquent, vérification manuelle)
            # Codes acceptés : 200, 301, 302, 308 (redirections normales)
            if [[ ! "$status" =~ ^(200|301|302|308)$ ]]; then
              PROBLEMS="${PROBLEMS}- ${name} : ${url} → HTTP ${status}\n"
            fi
          done
          if [ -n "$PROBLEMS" ]; then
            echo "problems<<EOF" >> $GITHUB_OUTPUT
            echo -e "$PROBLEMS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "has_problems=true" >> $GITHUB_OUTPUT
          else
            echo "has_problems=false" >> $GITHUB_OUTPUT
          fi
      - name: Créer une issue si anomalies
        if: steps.check.outputs.has_problems == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          PROBLEMS: ${{ steps.check.outputs.problems }}
        with:
          script: |
            const today = new Date().toISOString().slice(0,10);
            const body = `Anomalies détectées par le healthcheck mensuel du ${today} :\n\n${process.env.PROBLEMS}\n\nVérification manuelle requise. Ce workflow ignore SSRN (anti-bot fréquent, à vérifier au navigateur).`;
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Healthcheck nœuds externes — anomalies du ${today}`,
              body: body,
              labels: ['monitoring', 'externe']
            });
